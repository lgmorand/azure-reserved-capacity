name: Publish site (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/script.sh'
      - 'media/logo.png'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site/assets _site/slides
          # Static site
          cp -r site/. _site/
          # Bring the automation script into the published site
          cp src/script.sh _site/script.sh
          # Logo used by the pages
          cp media/logo.png _site/assets/logo.png
          ls -R _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
